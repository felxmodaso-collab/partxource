name: yt-posters

on:
  push:
    branches: [main]
    paths: [content/site.json]

permissions:
  contents: write

concurrency:
  group: yt-posters
  cancel-in-progress: false

jobs:
  posters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch missing YouTube posters
        run: python3 scripts/fetch_yt_posters.py

      - name: Commit posters if anything changed
        run: |
          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            git config user.name "partx-poster-bot"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "auto: local posters for YouTube videos"
            git push
          else
            echo "no changes"
          fi
